{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Career Result</title>

<link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>

<div class="container">

<h1>Career Suggestions</h1>

<div class="skills-box">

<h3>Your Skills</h3>

<p>{{ skills }}</p>

</div>


<h2>Suggested Career Paths</h2>

{% for career in careers %}

<div class="career-card">

<p>{{ career }}</p>

</div>

{% endfor %}



<h2>Additional Skills to Learn</h2>

<ul class="skills-list">

{% for skill in additional_skills %}

<li>{{ skill }}</li>

{% endfor %}

</ul>


<a href="/">

<button class="btn">Analyze Again</button>

</a>

</div>

</body>

</html>
